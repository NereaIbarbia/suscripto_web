<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripto - Ajustes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">SUSCRIPTO</h1>
            <nav>
                <ul class="nav-menu">
                     <li class="nav-item"><a href="/">🏠 {{ textos.inicio }}</a></li>
                    <li class="nav-item"><a href="/calendario">📅 Calendario</a></li>
                    <li class="nav-item"><a href="/ahorro">🐷 Ahorros</a></li>
                    <li class="nav-item active"><a href="/ajustes">⚙️ Ajustes</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <h2 class="section-title text-center">{{ textos.ajustes }}</h2>
        
            <form action="/ajustes" method="POST">
                <div class="settings-grid">
                <div class="card">
                    <h3 class="card-title">ASPECTOS GRÁFICOS Y VISUALES</h3>
                    <div class="setting-row">
                        <span>Modo Oscuro</span>
                        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                    </div>
                    <div class="setting-row">
                        <span>Tema de Color</span>
                        <div class="color-picker">
                            <span class="color-dot" style="background: #7f8c8d; border: 2px solid #333;"></span>
                            <span class="color-dot" style="background: #3498db;"></span>
                            <span class="color-dot" style="background: #2ecc71;"></span>
                            <span class="color-dot" style="background: #e74c3c;"></span>
                            <span class="color-dot" style="background: #9b59b6;"></span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">FUNCIONALIDADES</h3>
                    <div class="setting-row">
                        <span>Notificaciones de Vencimiento</span>
                        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="setting-row">
                        <span>Recordatorios de Ahorro</span>
                        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">IDIOMA Y REGIÓN</h3>
                    <div class="setting-row">
                        <span>Idioma</span>
                        <select class="form-input" onchange="cambiarIdioma(this.value)">
                            <option value="es" {% if session.get('idioma','es') == 'es' %}selected{% endif %}>Español</option>
                            <option value="en" {% if session.get('idioma','es') == 'en' %}selected{% endif %}>English</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <span>Moneda</span>
                        <select class="form-input" name="moneda">
                            <option value="€" {% if moneda == '€' %}selected{% endif %}>Euro (€)</option>
                            <option value="$" {% if moneda == '$' %}selected{% endif %}>Dólar ($)</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">OTRAS CONFIGURACIONES</h3>
                    <button class="btn-grey full-width mb-1">Gestionar Métodos de Pago</button>
                    <button class="btn-grey full-width">Cerrar Sesión</button>
                </div>
            </div>
            <div class="text-center mt-2">
                <button class="btn-grey">Guardar Cambios</button>
            </div>
        </form>
        </main>
    </div>
    <script>
        function cambiarIdioma(lang) {
        window.location.href = "/ajustes?lang=" + lang;
        }
    </script>
</body>
</html>
