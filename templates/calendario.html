<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suscripto - {{ textos.calendario }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="{% if modo_oscuro %}dark-mode{% endif %}" style="font-family: 'Inter', sans-serif !important;">
    <div class="app-container" style="display: flex; height: 100vh; overflow: hidden; background-color: #f4f6f8;">
        <aside class="sidebar">
            <h1 class="logo">SUSCRIPTO</h1>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="/">🏠 {{ textos.inicio }}</a></li>
                    <li class="nav-item active"><a href="/calendario">📅 {{ textos.calendario }}</a></li>
                    <li class="nav-item"><a href="/ahorro">🐷 {{ textos.ahorros }}</a></li>
                    <li class="nav-item"><a href="/ajustes">⚙️ {{ textos.ajustes }}</a></li>
                </ul>
            </nav>
        </aside>

        <main style="flex: 1; padding: 2.5rem; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="color: #2c3e50;">{{ textos.calendario_personalizado }}</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <select id="mesSelect" style="padding: 0.5rem; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;"></select>
                    <select id="anioSelect" style="padding: 0.5rem; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;"></select>
                </div>
            </div>

            <div style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden;">
                <div id="calendarioGrid" style="display: grid; grid-template-columns: repeat(7, 1fr); width: 100%;"></div>
            </div>
        </main>
    </div>

    <script>
        const simboloMoneda = "{{ moneda }}";
        const suscripcionesReales = [
            {% for sub in suscripciones %}
            { 
                "nombre": {{ sub.nombre|tojson }}, 
                "precio": "{{ sub.precio | convertir_precio }}", 
                "anio": parseInt("{{ sub.fecha_cobro }}".substring(0, 4), 10),
                "mes": parseInt("{{ sub.fecha_cobro }}".substring(5, 7), 10) - 1,
                "dia": parseInt("{{ sub.fecha_cobro }}".substring(8, 10), 10),
                "color": "{{ get_color(sub.nombre) }}",
                "ciclo": "{{ sub.ciclo }}",
                "autorenovacion": {{ 'true' if sub.autorenovacion else 'false' }}
            }{% if not loop.last %},{% endif %}
            {% endfor %}
        ];

        const grid = document.getElementById('calendarioGrid');
        const mesSelect = document.getElementById('mesSelect');
        const anioSelect = document.getElementById('anioSelect');
        const nombresMeses = {{ textos.meses | tojson | safe }};
        const diasSemana = {{ textos.dias | tojson | safe }};

        function cargarSelects() {
            nombresMeses.forEach((m, i) => mesSelect.innerHTML += `<option value="${i}">${m}</option>`);
            const anioActual = new Date().getFullYear();
            for(let a = anioActual - 1; a <= anioActual + 5; a++) {
                anioSelect.innerHTML += `<option value="${a}">${a}</option>`;
            }
            mesSelect.value = new Date().getMonth();
            anioSelect.value = anioActual;
        }

        function dibujar() {
            grid.innerHTML = '';
            const m = parseInt(mesSelect.value); 
            const a = parseInt(anioSelect.value); 

            diasSemana.forEach(d => {
                grid.innerHTML += `<div style="text-align:center; padding:12px; background:#f8f9fa; font-weight:700; border-bottom:2px solid #eee; border-right:1px solid #eee; font-family: 'Inter', sans-serif;">${d}</div>`;
            });

            let inicio = new Date(a, m, 1).getDay();
            inicio = (inicio === 0) ? 6 : inicio - 1; 
            const totalDias = new Date(a, m + 1, 0).getDate();

            for(let i=0; i<inicio; i++) {
                grid.innerHTML += `<div style="min-height:100px; border-right:1px solid #eee; border-bottom:1px solid #eee; background:#fafafa;"></div>`;
            }

            for(let d=1; d<=totalDias; d++) {
                let htmlDia = `<div style="min-height:100px; border-right:1px solid #eee; border-bottom:1px solid #eee; padding:8px; display:flex; flex-direction:column;">
                    <span style="font-weight:700; color:#555;">${d}</span>`;
                
                suscripcionesReales.forEach(sub => {
                    let mostrar = false;
                    let fechaCalendario = new Date(a, m, d);
                    let diaCobroReal = Math.min(sub.dia, totalDias);
                    
                    // Si es "Prueba Mensual", le quita la palabra Prueba para tratarlo como Mensual normal
                    const cicloLimpio = sub.ciclo.replace('Prueba ', '');

                    if (sub.autorenovacion) {
                        if (fechaCalendario >= new Date(sub.anio, sub.mes, 1)) {
                            if (cicloLimpio === "Mensual" && diaCobroReal === d) mostrar = true;
                            if (cicloLimpio === "Anual" && sub.mes === m && diaCobroReal === d) mostrar = true;
                        }
                    } else {
                        if(sub.dia === d && sub.mes === m && sub.anio === a) mostrar = true;
                    }

                    if(mostrar) {
                        htmlDia += `<div style="background:${sub.color}; color:white; font-size:0.75rem; padding:4px; border-radius:4px; margin-top:5px; text-align:center;">
                            ${sub.nombre} <br> ${sub.precio} ${simboloMoneda}
                        </div>`;
                    }
                });
                grid.innerHTML += htmlDia + `</div>`;
            }
        }

        cargarSelects();
        dibujar();
        mesSelect.onchange = dibujar;
        anioSelect.onchange = dibujar;
    </script>
</body>
</html>
