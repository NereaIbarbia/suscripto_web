<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripto - Calendario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">SUSCRIPTO</h1>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="/">🏠 Inicio</a></li>
                    <li class="nav-item active"><a href="/calendario">📅 Calendario</a></li>
                    <li class="nav-item"><a href="/ahorro">🐷 Ahorros</a></li>
                    <li class="nav-item"><a href="/ajustes">⚙️ Ajustes</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="calendar-header">
                <div class="calendar-selects">
                    <div class="select-group">
                        <label>Mes</label>
                        <select class="form-input" id="mesSelect">
                            <option value="0">Enero</option>
                            <option value="1">Febrero</option>
                            <option value="2">Marzo</option>
                            <option value="3">Abril</option>
                            <option value="4">Mayo</option>
                            <option value="5">Junio</option>
                            <option value="6">Julio</option>
                            <option value="7">Agosto</option>
                            <option value="8">Septiembre</option>
                            <option value="9">Octubre</option>
                            <option value="10">Noviembre</option>
                            <option value="11">Diciembre</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <label>Año</label>
                        <select class="form-input" id="anioSelect">
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>
                </div>
                <button class="btn-success btn-small">➕ AÑADIR NUEVA</button>
            </div>

            <div class="card p-0">
                <div class="calendar-grid" id="calendarioGrid"></div>
            </div>
        </main>
    </div>

    <script>
        const mesSelect = document.getElementById('mesSelect');
        const anioSelect = document.getElementById('anioSelect');
        const grid = document.getElementById('calendarioGrid');
        const diasSemana = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

        // Datos visuales de prueba para que veas cómo queda
        const suscripcionesPrueba = {
            15: { nombre: 'Netflix', precio: '13.99', clase: 'netflix' },
            27: { nombre: 'Prime', precio: '4.99', clase: 'prime' }
        };

        function generarCalendario() {
            const mes = parseInt(mesSelect.value);
            const anio = parseInt(anioSelect.value);
            grid.innerHTML = ''; // Limpiar el calendario actual

            // 1. Añadir las cabeceras de los días (Lunes a Domingo)
            diasSemana.forEach(dia => {
                grid.innerHTML += `<div class="weekday">${dia}</div>`;
            });

            // 2. Calcular qué día de la semana cae el día 1 del mes
            let fechaPrimerDia = new Date(anio, mes, 1);
            let diaSemanaInicio = fechaPrimerDia.getDay();
            // Ajustar para que Lunes sea 0 y Domingo 6 (JavaScript por defecto hace Domingo = 0)
            diaSemanaInicio = diaSemanaInicio === 0 ? 6 : diaSemanaInicio - 1;

            // 3. Calcular cuántos días tiene el mes exacto (esto gestiona bisiestos automáticamente)
            const diasTotales = new Date(anio, mes + 1, 0).getDate();

            // 4. Crear cajas vacías hasta llegar al día 1
            for (let i = 0; i < diaSemanaInicio; i++) {
                grid.innerHTML += `<div class="day" style="background-color: #f9f9f9; border-color: transparent;"></div>`;
            }

            // 5. Rellenar los días del mes
            for (let dia = 1; dia <= diasTotales; dia++) {
                let contenidoHtml = `${dia}`;
                
                // Si coincide que hay una suscripción este día, pintarla
                if (suscripcionesPrueba[dia]) {
                    let sub = suscripcionesPrueba[dia];
                    contenidoHtml += `<div class="event-pill ${sub.clase}">${sub.nombre}<br>${sub.precio} €</div>`;
                }

                grid.innerHTML += `<div class="day">${contenidoHtml}</div>`;
            }
        }

        // Cada vez que cambies el desplegable de mes o año, se recalcula solo
        mesSelect.addEventListener('change', generarCalendario);
        anioSelect.addEventListener('change', generarCalendario);

        // Al abrir la página, poner el mes y año en el que estamos actualmente y generar
        const hoy = new Date();
        mesSelect.value = hoy.getMonth(); 
        anioSelect.value = hoy.getFullYear();
        generarCalendario();
    </script>
</body>
</html>
