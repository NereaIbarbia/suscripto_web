<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ahorro y Gastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-4">Tu Análisis de Gastos</h1>

        <div class="alert alert-primary">
            Total gastado al mes: <strong>{{ total }} €</strong>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-3">
                <canvas id="graficoGastos"></canvas>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a href="/" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>

    <div id="datos-ocultos" 
         data-nombres='{{ labels | tojson | safe }}' 
         data-precios='{{ data | tojson | safe }}'>
    </div>

    <script>
        // 1. Leemos los datos del div oculto
        var divDatos = document.getElementById('datos-ocultos');
        var nombres = JSON.parse(divDatos.getAttribute('data-nombres'));
        var precios = JSON.parse(divDatos.getAttribute('data-precios'));

        // 2. Comprobamos si hay datos para evitar errores si la lista está vacía
        if (nombres.length > 0) {
            var ctx = document.getElementById('graficoGastos').getContext('2d');
            
            new Chart(ctx, {
                type: 'pie', // Tipo de gráfico: 'pie' (tarta) o 'doughnut' (dona)
                data: {
                    labels: nombres,
                    datasets: [{
                        label: 'Precio (€)',
                        data: precios,
                        backgroundColor: [
                            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', 
                            '#9966FF', '#FF9F40', '#C9CBCF'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true
                }
            });
        }
    </script>
</body>
</html>
